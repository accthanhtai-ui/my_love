<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Bí mật dành cho em 💜</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      width: 100%;
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    body {
      background: #f0eafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px 16px 60px;
      position: relative;
      overflow-x: hidden;
    }

    /* ---- Floating bubbles ---- */
    .bubble {
      position: fixed;
      border-radius: 50%;
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    .b1 { width: 120px; height: 120px; background: #c084fc; top: -30px; left: -30px; animation: floatUp 7s ease-in-out infinite; }
    .b2 { width: 80px;  height: 80px;  background: #a855f7; bottom: 40px; right: -20px; animation: floatUp 9s ease-in-out infinite 1s; }
    .b3 { width: 50px;  height: 50px;  background: #d8b4fe; top: 45%; left: 5%;  animation: floatUp 8s ease-in-out infinite 2s; }
    .b4 { width: 65px;  height: 65px;  background: #e9d5ff; top: 20%; right: 8%; animation: floatUp 6s ease-in-out infinite 0.5s; }
    .b5 { width: 40px;  height: 40px;  background: #c084fc; bottom: 120px; left: 15%; animation: floatUp 10s ease-in-out infinite 3s; }

    @keyframes floatUp {
      0%, 100% { transform: translateY(0px) scale(1); }
      50%       { transform: translateY(-20px) scale(1.05); }
    }

    /* ---- Screens ---- */
    .screen {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }
    .screen.hidden { display: none; }

    /* ---- Screen 1: Welcome ---- */
    .heart-icon {
      font-size: 72px;
      animation: heartbeat 1.4s ease-in-out infinite;
      line-height: 1;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.15); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.1); }
      56%       { transform: scale(1); }
    }

    .welcome-title {
      font-size: clamp(20px, 5vw, 24px);
      font-weight: 700;
      color: #6d28d9;
      line-height: 1.4;
    }
    .welcome-sub {
      font-size: clamp(14px, 3.5vw, 16px);
      color: #9f68e8;
      line-height: 1.7;
    }

    .btn-main {
      background: linear-gradient(135deg, #9333ea, #c084fc);
      color: white;
      border: none;
      padding: 16px 40px;
      border-radius: 999px;
      font-size: clamp(15px, 4vw, 17px);
      font-weight: 600;
      cursor: pointer;
      font-family: 'Be Vietnam Pro', sans-serif;
      box-shadow: 0 6px 24px rgba(147, 51, 234, 0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      width: 100%;
      max-width: 300px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-main:hover  { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(147,51,234,0.45); }
    .btn-main:active { transform: scale(0.96); }

    /* ---- Screen 2: Gifts ---- */
    .gifts-heading {
      font-size: clamp(18px, 5vw, 22px);
      font-weight: 700;
      color: #6d28d9;
    }
    .gifts-sub {
      font-size: clamp(13px, 3.5vw, 15px);
      color: #9f68e8;
      margin-top: -10px;
    }

    .gifts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
    }

    .gift-box {
      background: white;
      border: 2.5px solid #ddd6fe;
      border-radius: 20px;
      padding: 24px 12px 20px;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .gift-box:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 28px rgba(147,51,234,0.2);
      border-color: #a855f7;
    }
    .gift-box:active {
      transform: scale(0.95);
    }
    .gift-icon-wrap {
      font-size: 44px;
      display: block;
      margin-bottom: 10px;
      animation: wiggle 3s ease-in-out infinite;
    }
    .gift-box:nth-child(2) .gift-icon-wrap { animation-delay: 0.4s; }
    .gift-box:nth-child(3) .gift-icon-wrap { animation-delay: 0.8s; }
    .gift-box:nth-child(4) .gift-icon-wrap { animation-delay: 1.2s; }

    @keyframes wiggle {
      0%,100% { transform: rotate(0deg); }
      15%      { transform: rotate(-8deg); }
      30%      { transform: rotate(8deg); }
      45%      { transform: rotate(0deg); }
    }

    .gift-label {
      font-size: clamp(12px, 3.5vw, 14px);
      font-weight: 600;
      color: #7c3aed;
    }

    /* ---- Screen 3: Result ---- */
    .confetti-strip {
      font-size: 28px;
      letter-spacing: 4px;
      animation: sway 2s ease-in-out infinite;
    }
    @keyframes sway {
      0%,100% { transform: rotate(-4deg); }
      50%      { transform: rotate(4deg); }
    }

    .congrats-text {
      font-size: clamp(20px, 5.5vw, 24px);
      font-weight: 700;
      color: #7c3aed;
    }

    .result-card {
      background: white;
      border: 2.5px solid #c4b5fd;
      border-radius: 24px;
      padding: 28px 24px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(147,51,234,0.18);
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    .result-big-icon {
      font-size: 60px;
      display: block;
      margin-bottom: 14px;
    }
    .result-message {
      font-size: clamp(15px, 4.5vw, 18px);
      font-weight: 600;
      color: #5b21b6;
      line-height: 1.6;
    }

    .btn-back {
      background: transparent;
      border: 2px solid #c4b5fd;
      color: #7c3aed;
      padding: 13px 32px;
      border-radius: 999px;
      font-size: clamp(14px, 3.5vw, 15px);
      font-weight: 600;
      cursor: pointer;
      font-family: 'Be Vietnam Pro', sans-serif;
      transition: background 0.15s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
      width: 100%;
      max-width: 280px;
    }
    .btn-back:hover  { background: #f5f0ff; }
    .btn-back:active { transform: scale(0.96); }

    /* ---- Footer ---- */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      text-align: center;
      padding: 10px 16px;
      font-size: 12px;
      color: #a78bfa;
      font-weight: 500;
      letter-spacing: 0.4px;
      background: rgba(240, 234, 252, 0.85);
      backdrop-filter: blur(6px);
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- Bubbles -->
  <div class="bubble b1"></div>
  <div class="bubble b2"></div>
  <div class="bubble b3"></div>
  <div class="bubble b4"></div>
  <div class="bubble b5"></div>

  <!-- Screen 1: Welcome -->
  <div class="screen" id="s-welcome">
    <div class="heart-icon">💝</div>
    <div class="welcome-title">Có một điều bí mật<br>dành riêng cho em nè~</div>
    <div class="welcome-sub">Nhấn vào nút bên dưới để<br>khám phá bí mật ngọt ngào nhé 🌸</div>
    <button class="btn-main" onclick="goToGifts()">💌 Mở lên đi em iu</button>
  </div>

  <!-- Screen 2: Gift Selection -->
  <div class="screen hidden" id="s-gifts">
    <div class="gifts-heading">🎀 Em bé bóc tui mù đi 🎀</div>
    <div class="gifts-sub">Chọn 1 hộp quà em nhé~</div>
    <div class="gifts-grid">
      <div class="gift-box" onclick="openGift(this)">
        <span class="gift-icon-wrap">🎁</span>
        <div class="gift-label">Hộp quà số 1</div>
      </div>
      <div class="gift-box" onclick="openGift(this)">
        <span class="gift-icon-wrap">🎀</span>
        <div class="gift-label">Hộp quà số 2</div>
      </div>
      <div class="gift-box" onclick="openGift(this)">
        <span class="gift-icon-wrap">🎊</span>
        <div class="gift-label">Hộp quà số 3</div>
      </div>
      <div class="gift-box" onclick="openGift(this)">
        <span class="gift-icon-wrap">💝</span>
        <div class="gift-label">Hộp quà số 4</div>
      </div>
    </div>
  </div>

  <!-- Screen 3: Result -->
  <div class="screen hidden" id="s-result">
    <div class="confetti-strip">🎉✨🎊💜</div>
    <div class="congrats-text">Chúc mừng em yêu~!</div>
    <div class="result-card">
      <span class="result-big-icon" id="res-icon">🎁</span>
      <div class="result-message" id="res-text"></div>
    </div>
    <button class="btn-back" onclick="goBack()">🔄 Chọn hộp khác</button>
  </div>

  <footer>💜 Tác giả: THANH TÀI IU EM :))) 💜</footer>

  <script>
    var gifts = [
      { icon: "🍜", text: "Anh bé trộn bánh tráng cho em nhé!\nNgon lắm đó em ơi~ 😋" },
      { icon: "🤗", text: "Anh bé hun em miến\nvà ôm em 1 cái thật chặt nha! 💕" },
      { icon: "🎮", text: "Anh bé ngồi chơi với bé\n1 tý xíu rồi mới đi họp nha! ⏰" },
      { icon: "💵", text: "Anh bé tặng em 100k nè!\nEm muốn mua gì thì mua nhé~ 🛍️" }
    ];

    function show(id) {
      ['s-welcome','s-gifts','s-result'].forEach(function(s) {
        document.getElementById(s).classList.add('hidden');
      });
      document.getElementById(id).classList.remove('hidden');
      window.scrollTo(0, 0);
    }

    function goToGifts() { show('s-gifts'); }

    function openGift() {
      var pick = gifts[Math.floor(Math.random() * gifts.length)];
      document.getElementById('res-icon').textContent = pick.icon;
      document.getElementById('res-text').textContent = pick.text;
      show('s-result');
    }

    function goBack() { show('s-gifts'); }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Bí mật dành cho em 💜</title>
  <link href="./style.css" rel="stylesheet" />
  <style>
  </style>
</head>
<body>

  <!-- Bubbles -->
  <div class="bubble b1"></div>
  <div class="bubble b2"></div>
  <div class="bubble b3"></div>
  <div class="bubble b4"></div>
  <div class="bubble b5"></div>

  <!-- Screen 1: Welcome -->
  <div class="screen" id="s-welcome">
    <div class="heart-icon">💝</div>
    <div class="welcome-title">Có một điều bí mật<br>dành riêng cho em nè~</div>
    <div class="welcome-sub">Nhấn vào nút bên dưới để<br>khám phá bí mật ngọt ngào nhé 🌸</div>
    <button class="btn-main" onclick="goToGifts()">💌 Mở lên đi em iu</button>
  </div>

  <!-- Screen 2: Gift Selection -->
  <div class="screen hidden" id="s-gifts">
    <div class="gifts-heading">🎀 Em bé bóc tui mù đi 🎀</div>
    <div class="gifts-sub">Chọn 1 hộp quà em nhé~</div>
    <div class="gifts-grid">
      <div class="gift-box" onclick="openGift(this)">
        <span class="gift-icon-wrap">🎁</span>
        <div class="gift-label">Hộp quà số 1</div>
      </div>
      <div class="gift-box" onclick="openGift(this)">
        <span class="gift-icon-wrap">🎀</span>
        <div class="gift-label">Hộp quà số 2</div>
      </div>
      <div class="gift-box" onclick="openGift(this)">
        <span class="gift-icon-wrap">🎊</span>
        <div class="gift-label">Hộp quà số 3</div>
      </div>
      <div class="gift-box" onclick="openGift(this)">
        <span class="gift-icon-wrap">💝</span>
        <div class="gift-label">Hộp quà số 4</div>
      </div>
    </div>
  </div>

  <!-- Screen 3: Result -->
  <div class="screen hidden" id="s-result">
    <div class="confetti-strip">🎉✨🎊💜</div>
    <div class="congrats-text">Chúc mừng em yêu~!</div>
    <div class="result-card">
      <span class="result-big-icon" id="res-icon">🎁</span>
      <div class="result-message" id="res-text"></div>
    </div>
    <button class="btn-back" onclick="goBack()">🔄 Chọn hộp khác</button>
  </div>

  <footer>💜 Tác giả: THANH TÀI IU EM :))) 💜</footer>

  <script>
    var gifts = [
      { icon: "🍜", text: "Anh bé trộn bánh tráng cho em nhé!\nNgon lắm đó em ơi~ 😋" },
      { icon: "🤗", text: "Anh bé hun em miến\nvà ôm em 1 cái thật chặt nha! 💕" },
      { icon: "🎮", text: "Anh bé ngồi chơi với bé\n1 tý xíu rồi mới đi họp nha! ⏰" },
      { icon: "💵", text: "Anh bé tặng em 100k nè!\nEm muốn mua gì thì mua nhé~ 🛍️" }
    ];

    function show(id) {
      ['s-welcome','s-gifts','s-result'].forEach(function(s) {
        document.getElementById(s).classList.add('hidden');
      });
      document.getElementById(id).classList.remove('hidden');
      window.scrollTo(0, 0);
    }

    function goToGifts() { show('s-gifts'); }

    function openGift() {
      var pick = gifts[Math.floor(Math.random() * gifts.length)];
      document.getElementById('res-icon').textContent = pick.icon;
      document.getElementById('res-text').textContent = pick.text;
      show('s-result');
    }

    function goBack() { show('s-gifts'); }
  </script>
</body>
</html>
